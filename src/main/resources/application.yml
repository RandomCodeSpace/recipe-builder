graphrag:
  version: v1
  llm:
    provider: ollama  # Options: ollama, ollama-cloud, azure-openai
    ollama:
      base-url: https://ollama.com  # For ollama-cloud use: https://ollama.com
      model-name: gemma3:4b-cloud
      api-key: ${OLLAMA_API_KEY:}  # Required for ollama-cloud only
    azure-openai:
      endpoint: ${AZURE_OPENAI_ENDPOINT:}
      api-key: ${AZURE_OPENAI_API_KEY:}
      deployment-name: ${AZURE_OPENAI_DEPLOYMENT:gpt-4o-mini}
  embedding:
    provider: ollama  # Options: ollama, ollama-cloud, azure-openai
    ollama:
      base-url: http://localhost:11434  # For ollama-cloud use: https://ollama.com
      model-name: nomic-embed-text
    azure-openai:
      endpoint: ${AZURE_OPENAI_ENDPOINT:}
      api-key: ${AZURE_OPENAI_API_KEY:}
      deployment-name: ${AZURE_OPENAI_EMBEDDING_DEPLOYMENT:text-embedding-3-small}
  ingest:
    max-text-length: 100000
  extraction:
    confidence-threshold: 0.6
    max-retries: 2
  vector-store:
    persistence-path: ./data/versions/${graphrag.version}/vector-store.json
  graph:
    persistence-path: ./data/versions/${graphrag.version}/graph.json
  persistence:
    interval-ms: 300000
  dedup:
    similarity-threshold: 0.85
  trace:
    similarity-threshold: 0.7

spring:
  datasource:
    url: jdbc:h2:file:./data/graphrag-db
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
